# Production scrape config: everything is a compose service, so targets use
# service names instead of the host gateway (see prometheus.yml for local dev).
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: subba-api
    static_configs:
      - targets: ["api:8080"]

  # RabbitMQ's built-in Prometheus plugin (enabled in infra/rabbitmq/enabled_plugins).
  # Exposes queue depth and dead-letter depth — the primary fault signals.
  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
